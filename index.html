<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

  <!-- Theme color matches dark onyx by default; updates dynamically -->
  <meta name="theme-color" content="#0A0D14" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#FAF8F3" media="(prefers-color-scheme: light)" />

  <!-- Primary SEO -->
  <title>Arkan AI Solutions — The pillars of intelligent automation</title>
  <meta name="description" content="Arkan engineers the load-bearing AI infrastructure beneath modern enterprises across MENA. Agents, automation, integrations — built for production." />
  <meta name="keywords" content="AI Solutions, Automation, n8n, Botpress, MENA, AI Agents, Workflow Automation, Custom AI, Enterprise AI, Cairo, Arabic AI" />
  <meta name="author" content="Arkan AI Solutions" />

  <!-- Open Graph -->
  <meta property="og:title" content="Arkan AI Solutions — The pillars of intelligent automation" />
  <meta property="og:description" content="Engineering load-bearing AI infrastructure beneath modern enterprises across MENA." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://arkan.ai" />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:locale:alternate" content="ar_EG" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Arkan AI Solutions" />
  <meta name="twitter:description" content="The pillars of intelligent automation. Built for MENA." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Performance: preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Initial inline style to prevent FOUC on dark theme -->
  <style>
    html { background: #0A0D14; }
    html[data-theme="light"] { background: #FAF8F3; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
